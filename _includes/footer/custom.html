<!-- start custom footer snippets -->

<a href="/sitemap/">Sitemap</a>

<!-- ClustrMaps visitor globe -->
{% if site.clustrmaps_embed %}
<div style="text-align:center; margin-top:1em;">
  {{ site.clustrmaps_embed }}
</div>
{% elsif site.clustrmaps_id %}
<div style="text-align:center; margin-top:1em;">
  <script type='text/javascript' id='clustrmaps' src='https://cdn.clustrmaps.com/map_v2.js?cl=080808&w=300&t=tt&d={{ site.clustrmaps_id }}&co=ffffff&ct=808080&cmo=3acc3a&cmn=ff5353'></script>
  {% if site.clustrmaps_map_url %}
  <noscript>
    <a href="{{ site.clustrmaps_map_url }}" rel="noopener noreferrer">View my ClustrMaps visitor map</a>
  </noscript>
  {% endif %}
</div>
{% elsif site.clustrmaps_map_url %}
<div style="text-align:center; margin-top:1em;">
  <a href="{{ site.clustrmaps_map_url }}" rel="noopener noreferrer" style="font-weight:600; text-decoration:underline;">View my ClustrMaps visitor map</a>
</div>
{% endif %}

<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Plotly -->
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- end custom footer snippets -->
